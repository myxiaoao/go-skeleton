name: Release

# Triggered by pushing a semver tag (vX.Y.Z). Use:
#   git tag v0.2.0 && git push origin v0.2.0
#
# Security note: this workflow does NOT interpolate any user-controlled
# event fields into `run:` commands. All build steps go through `make`,
# which only consumes git-tracked state. Tag name reaches the build via
# `git describe` (read by Makefile), not via `${{ github.ref }}` shell
# expansion, so command-injection vectors don't apply here.

on:
  push:
    tags:
      - "v*"

permissions:
  # Required for creating the GitHub Release and uploading assets.
  contents: write
  # cosign keyless 用 GitHub OIDC 拿短期证书，必须 write。Sigstore Fulcio
  # 会把 workflow / repo / sha 等元数据签到证书 SAN 里，验证方据此判定来源。
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build cross-platform binaries and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # tag 名只来自 push refs/tags/v*（受信值），但还是收到 env 里——避免
    # 未来有人改 on: 触发条件后忘了审。run: 步骤只引用 $TAG，不在脚本里
    # 展开 ${{ github.* }} 表达式。
    env:
      TAG: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v6
        with:
          # `git describe --tags --dirty` needs full history.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Install tooling (oapi-codegen / golangci-lint / gci / gofumpt)
        run: make init

      - name: Verify
        # Same gate regular CI runs — won't release a broken build.
        run: make verify

      - name: Build release artifacts
        # Produces dist/<version>/{linux-amd64,linux-arm64}/ plus tarballs
        # and SHA256SUMS. VERSION defaults to `git describe --tags --dirty`,
        # so on a clean tag push this becomes the tag string.
        run: make release

      # SBOM：用 anchore/syft 扫源码 + go.mod，输出 SPDX JSON。每个 tarball
      # 都有源同一棵代码树，所以共用一份 SBOM（与 tarball 同目录上传）。
      # SPDX 2.3 是 ISO 标准、被 GitHub / GitLab / EU CRA 普遍接受；要 CycloneDX
      # 也可同时跑——按需扩展。
      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: dist/${{ env.TAG }}/sbom.spdx.json
          # 不再上传到 release：下一步统一上传，否则会重复。
          upload-release-assets: false
          upload-artifact: false

      # cosign keyless 签 tarball + SHA256SUMS + SBOM。私钥不落盘——证书走
      # Fulcio + Rekor 透明日志。验证方用：
      #   cosign verify-blob \
      #     --certificate <file>.crt \
      #     --signature <file>.sig \
      #     --certificate-identity-regexp 'https://github.com/<org>/<repo>/.github/workflows/release.yml@.*' \
      #     --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
      #     <file>
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          # pin 版本，避免 latest 漂移影响验签。
          cosign-release: v2.4.1

      - name: Sign release artifacts (keyless)
        env:
          DIST: dist/${{ env.TAG }}
        run: |
          set -e
          cd "$DIST"
          for f in go-skeleton-*-linux-amd64.tar.gz \
                   go-skeleton-*-linux-arm64.tar.gz \
                   SHA256SUMS \
                   sbom.spdx.json; do
            [ -e "$f" ] || { echo "missing artifact: $f" >&2; exit 1; }
            echo "=== signing $f ==="
            # --yes 跳过交互确认；CI 环境必须。
            cosign sign-blob \
              --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.crt" \
              "$f"
          done
          echo "=== signed artifacts ==="
          # 加 -- 避免文件名中可能的 dash 被当成 ls 选项（shellcheck SC2035）。
          ls -1 -- *.sig *.crt

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/*/go-skeleton-*-linux-amd64.tar.gz
            dist/*/go-skeleton-*-linux-arm64.tar.gz
            dist/*/SHA256SUMS
            dist/*/sbom.spdx.json
            dist/*/*.sig
            dist/*/*.crt
