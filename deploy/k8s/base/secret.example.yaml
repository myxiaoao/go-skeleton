# go-skeleton-secrets — 敏感配置占位示例，**不要直接 apply 这份文件**。
#
# 生产 Secret 创建方式（任选其一）：
#
#   1. kubectl 直接建（最简单，但 value 会进 shell history / shell logs）：
#
#      kubectl -n go-skeleton create secret generic go-skeleton-secrets \
#        --from-literal=JWT_SECRET="$(openssl rand -hex 32)" \
#        --from-literal=POSTGRES="postgres://app:STRONG@pg-host:5432/app?sslmode=require" \
#        --from-literal=REDIS_ADDR="redis-host:6379" \
#        --from-literal=REDIS_PASSWORD="STRONG-REDIS-PWD"
#
#   2. sealed-secrets / external-secrets / vault 等托管方案——推荐，避免明文落盘。
#
#   3. 公司有 Secrets-as-Code 流程时，把这份文件复制成 secret.production.yaml，
#      用 KMS / SOPS 加密后入库；本文件本身**永远不入库真值**。
#
# 必须包含的 key（与 .env.example 里 Production 必填项对齐）：
#   - JWT_SECRET           ≥32 字节随机串；占位 "change-me-..." 会被 config.validate fail-fast 拒绝
#   - POSTGRES             完整 DSN：postgres://USER:PWD@HOST:PORT/DB?sslmode=require
#   - REDIS_ADDR           HOST:PORT
#   - REDIS_PASSWORD       Redis 鉴权密码（如启用 ACL 则配合 REDIS_USER）
#
# 可选 key（按业务需要补）：
#   - REDIS_USER           Redis 6+ ACL 用户名
#   - REDIS_TLS_*          REDIS_TLS_ENABLED=true 时的证书相关
#
# 这份文件留在仓库里只作为 **schema 参考**，data 字段全为提示串、apply 后服务会
# 在 config.validate 阶段挂掉。
apiVersion: v1
kind: Secret
metadata:
  name: go-skeleton-secrets
  labels:
    app.kubernetes.io/name: go-skeleton
type: Opaque
stringData:
  JWT_SECRET: "REPLACE-WITH-32+-BYTE-RANDOM-HEX"
  POSTGRES: "postgres://REPLACE-USER:REPLACE-PWD@pg-host:5432/app?sslmode=require"
  REDIS_ADDR: "redis-host:6379"
  REDIS_PASSWORD: "REPLACE-WITH-REDIS-PASSWORD"
