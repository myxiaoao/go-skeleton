name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: make verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install tools (oapi-codegen + golangci-lint)
        run: make init

      - name: Verify
        run: make verify

      - name: Race detector
        run: make test-race

  validate-systemd-units:
    name: validate-systemd-units
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      # systemd-analyze verify 会把 ExecStart / EnvironmentFile / User 当真存
      # 在的资源校验。CI runner 上没装这些，先创建占位让真正想校验的"unit
      # 语法 / key / value / Type=notify 一致性"信号能跑过。
      - name: Prepare placeholder targets for systemd-analyze
        run: |
          set -e
          sudo useradd --system --no-create-home --shell /usr/sbin/nologin go-skeleton 2>/dev/null || true
          sudo mkdir -p /opt/go-skeleton/bin /etc/go-skeleton
          sudo touch /opt/go-skeleton/bin/api /opt/go-skeleton/bin/worker /opt/go-skeleton/bin/migrate
          sudo chmod +x /opt/go-skeleton/bin/api /opt/go-skeleton/bin/worker /opt/go-skeleton/bin/migrate
          sudo touch /etc/go-skeleton/.env
          sudo chown -R go-skeleton:go-skeleton /opt/go-skeleton
          sudo chmod 0640 /etc/go-skeleton/.env
          sudo chown root:go-skeleton /etc/go-skeleton/.env
      - name: Verify systemd unit syntax
        run: |
          set -e
          for unit in deploy/systemd/*.service; do
            echo "=== $unit ==="
            sudo systemd-analyze verify "$unit"
          done
