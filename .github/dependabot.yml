version: 2
updates:
  # Go modules
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels:
      - dependencies
      - go
    groups:
      # 把 patch/minor 升级合并成一个 PR，避免一周 10 个 noisy PR
      patch-and-minor:
        applies-to: version-updates
        update-types:
          - patch
          - minor

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(ci)"
    labels:
      - dependencies
      - github-actions
