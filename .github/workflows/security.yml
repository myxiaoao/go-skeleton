name: security

# 安全扫描跟 ci.yml 解耦：CVE 数据库 / gosec 升级会让原本通过的代码突然失败，
# 把它绑进 PR 必跑会让常规迭代体验抖动。这里走定时 + 手动触发；扫到问题
# 通过 issue / Slack 通知，不阻塞合并。

on:
  schedule:
    # 每周一 04:00 UTC（≈ 北京时间周一中午）。频率高点便于早发现 CVE。
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sec:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: make sec (govulncheck + gosec)
        run: make sec
