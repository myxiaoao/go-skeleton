# Local dev dependencies for go-skeleton.
# Brings up Postgres + Redis with credentials and ports aligned to .env.example
# so a fresh clone can run `make dev-up && go run ./cmd/api` without edits.
#
# Volumes are named so `make dev-down` keeps data; use `make dev-reset` to wipe.

services:
  postgres:
    image: postgres:17-alpine
    container_name: go-skeleton-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d app"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: go-skeleton-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Asynqmon：Asynq 官方 Web UI，看队列堆积 / 失败任务 / 重试历史。
  # 默认不启动（profiles: debug），要用时：
  #   docker compose --profile debug up -d asynqmon
  # 然后访问 http://127.0.0.1:8980 。
  # 生产**绝对不要**暴露这个端口；它没有内置鉴权。
  asynqmon:
    image: hibiken/asynqmon:latest
    container_name: go-skeleton-asynqmon
    restart: unless-stopped
    profiles: ["debug"]
    command:
      - "--redis-addr=redis:6379"
    ports:
      - "127.0.0.1:8980:8080"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
